# BACKGROUND
background {
    monitor =
    path = ~/wallpaper/wallpaper21.jpg
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = ~/wallpaper/zoro.jpg
    border_size = 0
    border_color = transparent
    size = 130
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 0
    halign = center
    valign = center
}

# USERNAME (below profile photo)
label {
    monitor =
    text = $USER
    color = rgba(255,255,255,0.8)
    font_size = 22
    font_family = SF Pro Display Bold

    position = 0, -90
    halign = center
    valign = center
}

# PASSWORD INPUT
input-field {
    monitor =
    size = 300, 55

    outline_thickness = 2
    outer_color = rgba(0,0,0,0)
    inner_color = rgba(0,0,0,0.5)   # black 50% transparency
    border_color = rgba(255,255,255,0.2)

    font_color = rgba(255,255,255,1)

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    fade_on_empty = false
    hide_input = false

    font_family = SF Pro Display Bold
    placeholder_text = <span foreground="##ffffff99">Enter Pass ...</span>

    position = 0, -150
    halign = center
    valign = center
}


# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 50
    halign = center
    valign = bottom
}