##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}






#wifi-manager
layerrule = blur on, match:namespace wifi-manager
layerrule = ignore_alpha 0.3, match:namespace wifi-manager
# layerrule = move (monitor_w-(window_w)-25) 60,match:namespace wifi-manager


windowrule = float on, match:class com.network.manager 
windowrule = size 500 300,match:class com.network.manager
windowrule = move (monitor_w-(window_w)-25) 60,match:class com.network.manager

# Bluetooth-menu
windowrule = float on, match:class blueman-manager
windowrule = size 500 300,match:class blueman-manager
windowrule = move (monitor_w-(window_w)-25) 60,match:class blueman-manager
